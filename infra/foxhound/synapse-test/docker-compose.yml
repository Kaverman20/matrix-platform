services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: synapse
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse"]
      interval: 10s
      timeout: 5s
      retries: 5

  synapse:
    image: matrixdotorg/synapse:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SYNAPSE_SERVER_NAME: matrix.foxhound.run
      SYNAPSE_REPORT_STATS: "no"
    volumes:
      - ./data/synapse:/data
    expose:
      - "8008"

  ketesa:
    image: ghcr.io/etkecc/ketesa:latest
    restart: unless-stopped
    expose:
      - "80"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - synapse
      - ketesa
    ports:
      - "80:80"
      - "443:443"
    # Reach LiveKit (host :7880) and lk-jwt (host 127.0.0.1:8080) from matrix-rtc.
    # See infra/foxhound/matrix-rtc/README.md.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./surfchat-dist:/srv/surfchat:ro
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config

