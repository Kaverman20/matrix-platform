services:
  matrix-keycloak-sync:
    build: .
    container_name: matrix-keycloak-sync
    restart: unless-stopped
    command: python sync.py --watch
    env_file:
      - config.env
    volumes:
      - ./mapping.yaml:/app/mapping.yaml:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # dbnet — внешняя сеть стека synapse-test, чтобы при RULES_SOURCE=db достучаться
    # до postgres (DATABASE_URL=...@postgres:5432/mapping). В YAML-режиме не нужна.
    networks:
      - default
      - dbnet

networks:
  dbnet:
    external: true
    name: synapse-test_default

